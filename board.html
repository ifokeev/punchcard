<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>punchcard</title>
<style>
 :root{
  --ink:#1a1a1a;--sec:#555;--mut:#8a8a8a;--faint:#b3b3b3;
  --line:rgba(0,0,0,.10);--accent:#2563eb;
  --c-todo:#b3b3b3;--c-in_progress:#e0b13a;--c-in_review:#5e6ad2;
  --c-done:#3fa66a;--c-blocked:#e08338;--c-failed:#df524d;--c-cancelled:#9a9a9a;
 }
 *{box-sizing:border-box}
 body{margin:0;background:#fff;color:var(--ink);
  font:16px/1.45 "Helvetica Neue",Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
 .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}
 .bar{background:#000;color:#fff;padding:18px 28px;display:flex;align-items:baseline;gap:14px}
 .bar b{font-size:21px;font-weight:700;letter-spacing:-.02em}
 .bar span{font-size:14px;color:rgba(255,255,255,.5)}
 .wrap{max-width:1320px;margin:0 auto;padding:28px}
 .addrow{margin-bottom:28px;display:flex;align-items:center;gap:12px}
 .ctl{margin-left:auto;display:flex;align-items:center;gap:12px}
 #pausebtn.paused{border-color:var(--c-in_progress);color:#a87908}
 .ghost.danger{color:var(--c-failed)}
 .ghost.danger:hover{border-color:var(--c-failed)}
 .ghost.danger.on{background:var(--c-failed);color:#fff;border-color:var(--c-failed)}
 .conc{display:inline-flex;align-items:center;gap:2px;border:1px solid var(--line);border-radius:8px;padding:0 6px 0 12px;
  font-size:13px;font-weight:600;color:var(--mut);white-space:nowrap}
 .conc b{min-width:18px;text-align:center;color:var(--ink);font-size:15px;padding:0 4px}
 .step{font-family:inherit;font-size:16px;line-height:1;color:var(--mut);background:none;border:none;cursor:pointer;padding:8px 8px}
 .step:hover{color:var(--ink)}
 .ghost{display:inline-flex;align-items:center;gap:8px;white-space:nowrap;
  font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);background:#fff;
  border:1px solid var(--line);padding:10px 16px;cursor:pointer;border-radius:8px;transition:border-color .15s}
 .ghost:hover{border-color:var(--ink)}
 .ghost svg{display:block;flex:none}
 form[hidden]{display:none}
 form{margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--line)}
 input,textarea{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-size:16px;line-height:1.45;
  color:var(--ink);padding:11px 13px;border:1px solid var(--line);background:#fff;width:100%;border-radius:8px}
 input::placeholder,textarea::placeholder{color:var(--faint)}
 input:focus,textarea:focus{outline:none;border-color:var(--ink)}
 textarea{resize:vertical;min-height:40px}
 .qa{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:stretch}
 .prio{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:8px;overflow:hidden}
 .prio span{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);padding:0 12px;white-space:nowrap}
 .prio input{width:62px;border:0;border-left:1px solid var(--line);border-radius:0;text-align:center}
 .submit{font-family:inherit;font-size:15px;font-weight:600;background:var(--ink);color:#fff;border:0;border-radius:8px;padding:11px 24px;cursor:pointer}
 .more{display:inline-block;margin-top:14px;font-size:14px;color:var(--mut);text-decoration:none}
 .more:hover{color:var(--ink)}
 .details{display:grid;gap:10px;margin-top:14px;max-width:760px}
 .details[hidden]{display:none}
 .cols{display:grid;grid-template-columns:repeat(7,1fr);gap:16px}
 @media(max-width:1180px){.cols{grid-template-columns:repeat(3,1fr)}}
 @media(max-width:700px){.cols{grid-template-columns:repeat(2,1fr)}}
 .col>h2{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;letter-spacing:.01em;
  color:var(--sec);margin:0 0 14px;padding-bottom:12px;border-bottom:1px solid var(--line)}
 .col>h2 .dot{width:9px;height:9px;border-radius:50%;flex:none}
 .col>h2 .ct{margin-left:auto;font-size:14px;color:var(--faint);font-weight:500}
 .dot-todo{background:var(--c-todo)}.dot-in_progress{background:var(--c-in_progress)}
 .dot-in_review{background:var(--c-in_review)}.dot-done{background:var(--c-done)}
 .dot-blocked{background:var(--c-blocked)}.dot-failed{background:var(--c-failed)}.dot-cancelled{background:var(--c-cancelled)}
 .card{position:relative;border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:10px;background:#fff;transition:border-color .15s;cursor:grab}
 .card:hover{border-color:rgba(0,0,0,.2)}
 .card.drag{opacity:.4}
 .col.drop{background:rgba(37,99,235,.05);border-radius:8px;box-shadow:0 0 0 4px rgba(37,99,235,.05)}
 .card .t{font-size:16px;font-weight:600;line-height:1.32;letter-spacing:-.006em;margin-bottom:9px;padding-right:20px}
 .card .del{position:absolute;top:10px;right:10px;background:none;border:none;padding:0;cursor:pointer;font-size:16px;line-height:1;color:var(--faint);transition:color .15s}
 .card .del:hover{color:var(--ink)}
 .card .m{font-size:14px;color:var(--mut)}
 .card .dep{margin-top:8px;font-size:12px;font-weight:600;color:var(--c-blocked)}
 .card .merged{margin-top:8px;font-size:12px;font-weight:600;color:var(--c-done)}
 .card .cancel{margin-top:10px;font-family:inherit;font-size:12px;font-weight:600;color:var(--c-failed);
  background:none;border:1px solid var(--line);border-radius:7px;padding:5px 11px;cursor:pointer}
 .card .cancel:hover{border-color:var(--c-failed)}
 .card .pr{display:inline-block;margin-top:10px;font-size:15px;color:var(--accent);text-decoration:none}
 .card .pr:hover{text-decoration:underline}
 .card img,.card video{display:block;width:100%;margin-top:12px;border:1px solid var(--line);border-radius:6px}
 .card .file{display:block;margin-top:8px;font-size:13px;color:var(--mut);word-break:break-all}
 .empty{color:var(--faint);font-size:14px;padding:2px 0}
 .morebtn{display:block;width:100%;margin-top:2px;padding:7px;font-family:inherit;font-size:12px;
  color:var(--mut);background:none;border:1px dashed var(--line);border-radius:7px;cursor:pointer}
 .morebtn:hover{color:var(--ink);border-color:var(--mut)}
 /* card detail modal */
 .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-start;justify-content:center;padding:48px 20px;z-index:50;overflow:auto}
 .overlay[hidden]{display:none}
 .modal{position:relative;background:#fff;border-radius:10px;max-width:560px;width:100%;padding:28px;box-shadow:0 10px 40px rgba(0,0,0,.18)}
 .modal .x{position:absolute;top:14px;right:16px;background:none;border:none;font-size:22px;line-height:1;color:var(--mut);cursor:pointer;padding:0}
 .modal .x:hover{color:var(--ink)}
 .modal .meta{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--mut);margin-bottom:10px}
 .modal .meta .dot{width:9px;height:9px;border-radius:50%;flex:none}
 .modal h2{font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1.25;margin:0 0 20px;padding-right:24px}
 .field{margin-bottom:18px}
 .field h3{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--mut);margin:0 0 6px}
 .field .v{font-size:15px;line-height:1.5;color:var(--ink);white-space:pre-wrap;word-break:break-word}
 .field .v.empty{color:var(--faint)}
 .field .v a{color:var(--accent);text-decoration:none}
 .field .v a:hover{text-decoration:underline}
 .field img,.field video{display:block;width:100%;margin-top:8px;border:1px solid var(--line);border-radius:6px}
 .field .file{display:block;margin-top:6px;font-size:13px;color:var(--mut);word-break:break-all}
 .modal .ts{display:flex;gap:22px;font-size:13px;color:var(--faint);border-top:1px solid var(--line);padding-top:14px}
</style></head>
<body>
<div class="bar"><b>punchcard</b><span>watch your AI coding agents ship</span></div>
<div class="wrap">
<div class="addrow">
 <button type="button" id="newbtn" class="ghost"><svg width="14" height="14" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 2.2v11.6M2.2 8h11.6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>New task</button>
 <span class="ctl">
  <button type="button" id="stopbtn" class="ghost danger" onclick="stopAll()" title="Pause the board and cancel every in-progress run">&#9209; Stop all</button>
  <button type="button" id="pausebtn" class="ghost">&#9208; Pause</button>
  <span class="conc" title="Max engineer agents running at once">agents<button type="button" class="step" onclick="setConc(-1)">&minus;</button><b id="concval" class="mono">3</b><button type="button" class="step" onclick="setConc(1)">+</button></span>
 </span>
</div>
<form id="f" hidden>
 <div class="qa">
  <input name="title" placeholder="What should your agents build?" required>
  <label class="prio"><span>priority</span><input name="priority" type="number" value="1" min="0"></label>
  <button class="submit" type="submit">Add task</button>
 </div>
 <a class="more" href="#" id="more">+ details (description, acceptance, repo)</a>
 <div class="details" id="details" hidden>
  <textarea name="description" placeholder="description / brief" rows="2"></textarea>
  <textarea name="acceptance" placeholder="acceptance criteria" rows="2"></textarea>
  <input name="repo" placeholder="repo (local path)">
 </div>
</form>
<div class="cols" id="board"></div>
</div>
<div class="overlay" id="overlay" hidden onclick="if(event.target===this)closeCard()">
 <div class="modal"><button class="x" onclick="closeCard()" aria-label="Close">&times;</button><div id="modalbody"></div></div>
</div>
<script>
const LABELS={todo:"Todo",in_progress:"In Progress",in_review:"In Review",done:"Done",blocked:"Blocked",failed:"Failed",cancelled:"Cancelled"};
const COLS=["todo","in_progress","in_review","done","blocked","failed","cancelled"];
const esc=s=>String(s==null?"":s).replace(/[&<>"'/]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;","/":"&#47;"}[c]));
// only allow http(s)/relative URLs through to href/src — blocks javascript:/data:
const safeURL=u=>/^(https?:\/\/|\/)/i.test(String(u||""))?u:"#";
const CAP=20, lim={};
let tasksById={};
async function load(){
 const tasks=await (await fetch("/api/tasks")).json();
 tasksById={}; for(const t of tasks) tasksById[t.id]=t;
 const board=document.getElementById("board"); board.innerHTML="";
 for(const c of COLS){
  const all=tasks.filter(t=>t.status===c);
  const cap=lim[c]||CAP;
  // when a column overflows, show the most-recently-updated first
  const items=(all.length>cap ? all.slice().sort((a,b)=>String(b.updated_at).localeCompare(String(a.updated_at))) : all).slice(0,cap);
  const col=document.createElement("div"); col.className="col";
  col.ondragover=dragOver; col.ondragleave=dragLeave; col.ondrop=e=>dropCard(e,c);
  let html='<h2><span class="dot dot-'+c+'"></span>'+LABELS[c]+'<span class="ct mono">'+all.length+'</span></h2>';
  for(const t of items){
   let h='<div class="card" draggable="true" onclick="openCard(\''+esc(t.id)+'\')" ondragstart="dragStart(event,\''+esc(t.id)+'\')" ondragend="dragEnd(event)"><button class="del" onclick="event.stopPropagation();delTask(\''+esc(t.id)+'\')" title="Delete">&times;</button><div class="t">'+esc(t.title)+'</div>';
   h+='<div class="m mono">'+esc(t.id)+' &middot; P'+(t.priority||0)+'</div>';
   const unmet=(t.depends_on||[]).filter(id=>!(tasksById[id]&&tasksById[id].merged));
   if(t.status==='todo'&&unmet.length) h+='<div class="dep">waiting on '+unmet.map(esc).join(', ')+'</div>';
   if(t.merged) h+='<div class="merged">&#10003; merged</div>';
   if(t.status==='in_progress') h+='<button class="cancel" onclick="event.stopPropagation();cancelTask(\''+esc(t.id)+'\')">Cancel run</button>';
   if(t.pr_url) h+='<a class="pr" href="'+esc(safeURL(t.pr_url))+'" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">View PR &rarr;</a>';
   for(const a of (t.artifacts||[])){
    const src=a.replace("/artifacts/","/preview/");
    if(/\.(png|gif|jpg|jpeg|webp)$/i.test(a)) h+='<img src="'+esc(safeURL(src))+'">';
    else if(/\.(mp4|webm)$/i.test(a)) h+='<video src="'+esc(safeURL(src))+'" controls muted></video>';
    else h+='<a class="file mono" href="'+esc(safeURL(a))+'" onclick="event.stopPropagation()">'+esc(a)+'</a>';
   }
   h+='</div>'; html+=h;
  }
  if(!all.length) html+='<div class="empty">&mdash;</div>';
  if(all.length>items.length) html+='<button class="morebtn" onclick="moreTasks(\''+c+'\')">show '+(all.length-items.length)+' more</button>';
  col.innerHTML=html; board.appendChild(col);
 }
}
function moreTasks(c){ lim[c]=(lim[c]||CAP)+CAP; load(); }
document.getElementById("newbtn").onclick=()=>{const f=document.getElementById("f");f.hidden=false;document.getElementById("newbtn").hidden=true;f.querySelector('[name=title]').focus();};
document.getElementById("more").onclick=e=>{e.preventDefault();document.getElementById("details").hidden=false;e.target.style.display="none";};
document.getElementById("f").onsubmit=async e=>{
 e.preventDefault();
 const fd=new FormData(e.target), body={};
 fd.forEach((v,k)=>body[k]=k==="priority"?Number(v):v);
 await fetch("/api/tasks",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
 e.target.reset();
 document.getElementById("f").hidden=true; document.getElementById("newbtn").hidden=false;
 load();
};
async function delTask(id){ if(!confirm('Delete this task?')) return; await fetch('/api/tasks/'+encodeURIComponent(id),{method:'DELETE'}); load(); }

// --- drag a card between columns to change its status ---
let dragging=false;
function dragStart(e,id){ dragging=true; e.dataTransfer.setData('text/plain',id); e.dataTransfer.effectAllowed='move'; e.currentTarget.classList.add('drag'); }
function dragEnd(e){ dragging=false; e.currentTarget.classList.remove('drag'); }
function dragOver(e){ e.preventDefault(); e.dataTransfer.dropEffect='move'; e.currentTarget.classList.add('drop'); }
function dragLeave(e){ e.currentTarget.classList.remove('drop'); }
async function dropCard(e,status){
 e.preventDefault(); e.currentTarget.classList.remove('drop'); dragging=false;
 const id=e.dataTransfer.getData('text/plain');
 if(!id) return;
 await fetch('/api/tasks/'+encodeURIComponent(id),{method:'PATCH',headers:{"Content-Type":"application/json"},body:JSON.stringify({status})});
 load();
}
async function cancelTask(id){ if(!confirm('Cancel this run? The agent stops at its next checkpoint and the task moves to Cancelled.')) return; await fetch('/api/tasks/'+encodeURIComponent(id),{method:'PATCH',headers:{"Content-Type":"application/json"},body:JSON.stringify({status:'cancelled'})}); load(); }

// --- click a card to see its full detail ---
function fmtDate(s){ if(!s) return ''; const d=new Date(s); return isNaN(d)?s:d.toLocaleString(); }
function field(label,val,mono){
 const empty=val==null||val==='';
 return '<div class="field"><h3>'+label+'</h3><div class="v'+(empty?' empty':'')+(mono?' mono':'')+'">'+(empty?'&mdash;':esc(val))+'</div></div>';
}
function openCard(id){
 const t=tasksById[id]; if(!t) return;
 let b='<div class="meta"><span class="dot dot-'+t.status+'"></span>'+LABELS[t.status]+' &middot; <span class="mono">'+esc(t.id)+'</span> &middot; P'+(t.priority||0)+(t.merged?' &middot; &#10003; merged':'')+'</div>';
 b+='<h2>'+esc(t.title)+'</h2>';
 b+=field('Description',t.description);
 b+=field('Acceptance criteria',t.acceptance);
 if((t.depends_on||[]).length){
  const lines=t.depends_on.map(id=>{const d=tasksById[id];return id+' — '+(!d?'unknown':d.merged?'merged':d.status);}).join('\n');
  b+=field('Depends on',lines,true);
 }
 if(t.repo) b+=field('Repo',t.repo,true);
 if(t.branch) b+=field('Branch',t.branch,true);
 if(t.pr_url) b+='<div class="field"><h3>Pull request</h3><div class="v"><a href="'+esc(safeURL(t.pr_url))+'" target="_blank" rel="noopener noreferrer">'+esc(t.pr_url)+' &rarr;</a></div></div>';
 if(t.note) b+=field('Note',t.note);
 const arts=t.artifacts||[];
 if(arts.length){
  b+='<div class="field"><h3>Proof of work</h3>';
  for(const a of arts){ const src=a.replace("/artifacts/","/preview/");
   if(/\.(png|gif|jpg|jpeg|webp)$/i.test(a)) b+='<img src="'+esc(safeURL(src))+'">';
   else if(/\.(mp4|webm)$/i.test(a)) b+='<video src="'+esc(safeURL(src))+'" controls muted></video>';
   else b+='<a class="file mono" href="'+esc(safeURL(a))+'">'+esc(a)+'</a>'; }
  b+='</div>';
 }
 b+='<div class="ts"><span>created '+esc(fmtDate(t.created_at))+'</span><span>updated '+esc(fmtDate(t.updated_at))+'</span></div>';
 document.getElementById('modalbody').innerHTML=b;
 document.getElementById('overlay').hidden=false;
}
function closeCard(){ document.getElementById('overlay').hidden=true; }
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeCard(); });

// --- run control: pause/resume + concurrency, mirrored from the server ---
let ctl={paused:false,concurrency:3};
let concTimer=null; // set while a stepper edit is pending (debounce + poll guard)
async function loadControl(){
 try{ ctl=await (await fetch("/api/control")).json(); }catch(e){ return; }
 if(concTimer==null) document.getElementById("concval").textContent=ctl.concurrency; // don't fight a pending edit
 const b=document.getElementById("pausebtn");
 b.innerHTML=ctl.paused?"&#9654; Resume":"&#9208; Pause";
 b.classList.toggle("paused",ctl.paused);
 document.getElementById("stopbtn").classList.toggle("on",!!ctl.stopped);
}
async function patchControl(body){
 await fetch("/api/control",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
 loadControl();
}
function togglePause(){ patchControl(ctl.paused?{paused:false,stopped:false}:{paused:true}); }
function setConc(d){
 // the displayed value is the source of truth so rapid clicks accumulate; one
 // debounced PATCH sends the final absolute value (avoids out-of-order PATCHes).
 const el=document.getElementById("concval");
 const n=Math.max(1,(parseInt(el.textContent,10)||3)+d);
 el.textContent=n;
 clearTimeout(concTimer);
 concTimer=setTimeout(()=>{ concTimer=null; patchControl({concurrency:n}); },300);
}
async function stopAll(){
 if(!confirm('Stop all runs? Pauses the board, cancels every in-progress task, and (if the kill-switch hook is enabled) hard-halts the loop on its next tool call. Clear with Resume.')) return;
 await fetch("/api/control",{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({paused:true,stopped:true})});
 await fetch("/api/cancel-all",{method:"POST"});
 loadControl(); load();
}
document.getElementById("pausebtn").onclick=togglePause;

loadControl(); load(); setInterval(()=>{ if(!dragging){loadControl();load();} },2000);
</script>
</body></html>
